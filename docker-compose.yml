services:
  api:
    build: .
    restart: on-failure
    ports:
      - "8000:8000"
    volumes:
      - ./app:/code/app
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - db

  db:
    image: postgres:15
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  frontend:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - ./frontend-livros:/app
    command: npm run dev -- --host
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:
